name: Build & Release Electron

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            dist_cmd: dist:mac:arm64
            artifact_name: macos-arm64
          - os: macos-latest
            dist_cmd: dist:mac:x64
            artifact_name: macos-x64
          - os: ubuntu-latest
            dist_cmd: dist:linux:x64
            artifact_name: linux-x64
          - os: ubuntu-latest
            dist_cmd: dist:linux:arm64
            artifact_name: linux-arm64
          - os: windows-latest
            dist_cmd: dist:win:x64
            artifact_name: win-x64
          - os: windows-latest
            dist_cmd: dist:win:arm64
            artifact_name: win-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            electron/package-lock.json

      - name: Setup Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install RPM (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Install client dependencies
        run: npm ci
        working-directory: ./client

      - name: Build client for Electron
        run: npm run build:electron
        working-directory: ./client

      - name: Install Electron dependencies
        run: npm ci
        working-directory: ./electron

      - name: Build distributables
        run: npm run ${{ matrix.dist_cmd }}
        working-directory: ./electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ matrix.artifact_name }}
          path: |
            electron/dist/*.dmg
            electron/dist/*.zip
            electron/dist/*.exe
            electron/dist/*.deb
            electron/dist/*.rpm
            electron/dist/*.tar.gz
            electron/dist/*.blockmap
            electron/dist/*.yml
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release & Upload
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          name: Release ${{ github.event.inputs.tag_name || github.ref_name }}
          draft: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
