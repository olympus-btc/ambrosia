name: Server Linter Test

on:
  pull_request:
    branches:
      - '**'

  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v5
        
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make Gradle wrapper executable
        run: chmod +x ./server/gradlew

      - name: Run Main Linter with Gradle
        working-directory: server
        run: ./gradlew :app:ktlintMainSourceSetCheck

      - name: Run Test Linter with Gradle
        working-directory: server
        run: ./gradlew :app:ktlintTestSourceSetCheck
