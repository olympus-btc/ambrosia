# Dev stack for NWC backend testing — fully isolated from production
#
# Start (onboarding mode, no NWC URI yet):
#   docker compose -f docker-compose.dev-nwc.yml up -d --build
#
# Start with NWC already configured (skip onboarding):
#   NWC_URI="nostr+walletconnect://..." docker compose -f docker-compose.dev-nwc.yml up -d --build
#
# Nuke (deletes dev DB, safe — production volumes are untouched):
#   docker compose -f docker-compose.dev-nwc.yml down -v
#
# Frontend: included as client-dev service with hot-reload via bind mount
# Nuke: docker compose -f docker-compose.dev-nwc.yml down -v  (safe, no prod volumes)

services:
  client-dev:
    image: node:20-alpine
    container_name: ambrosia-client-dev
    working_dir: /app
    volumes:
      - ./client:/app
      - client_dev_modules:/app/node_modules
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:9155
      INTERNAL_API_URL: http://ambrosia-dev:9155
      NEXT_TELEMETRY_DISABLED: "1"
    command: sh -c "npm install && npm run dev -- --port 3001"
    depends_on:
      - ambrosia-dev
    restart: unless-stopped

  ambrosia-dev:
    build: server/
    container_name: ambrosia-dev-nwc
    restart: unless-stopped
    ports:
      - "127.0.0.1:9155:9155"
      - "127.0.0.1:9445:9445"
    volumes:
      - ambrosia_dev_nwc_datadir:/root/.Ambrosia-POS
    entrypoint:
      - java
      - -jar
      - /app/ambrosia.jar
      - --http-bind-ip=0.0.0.0
      - --http-bind-port=9155
      - --ssl-bind-port=9445
      - --phoenixd-url=http://localhost:9740
      - --phoenixd-password=noop
      - --phoenixd-webhook-secret=noop
      - --docker

volumes:
  ambrosia_dev_nwc_datadir:
  client_dev_modules:
